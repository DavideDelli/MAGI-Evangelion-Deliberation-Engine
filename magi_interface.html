<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGI Supercomputer System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+JP:wght@900&display=swap');

    :root {
      --orange: #ff9900;
      --orange-dim: #cc7a00;
      --green: #00ff00;
      --green-dim: #008800;
      --blue: #42bcf5;
      --bg: #050505;
      --font-tech: 'Share Tech Mono', monospace;
      --font-kanji: 'Noto Serif JP', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--orange);
      font-family: var(--font-tech);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
    }

    /* Effetto Scanline stile Monitor CRT */
    .scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 100;
      pointer-events: none;
    }

    /* Contenitore Principale con doppio bordo */
    .magi-wrapper {
      position: relative;
      width: 100%;
      max-width: 1600px;
      height: 100%;
      border: 6px solid var(--orange);
      padding: 4px;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .magi-inner {
      border: 2px solid var(--orange);
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* HEADER: Kanji e Linee Verdi */
    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .kanji-title {
      font-family: var(--font-kanji);
      font-size: clamp(4rem, 8vw, 7rem);
      color: var(--orange);
      line-height: 1;
      letter-spacing: 0.1em;
      text-shadow: 2px 2px 0px #000, 0 0 15px rgba(255,153,0,0.5);
    }

    .green-lines {
      border-top: 3px solid var(--green);
      border-bottom: 1px solid var(--green);
      height: 10px;
      margin-top: 10px;
      width: 100%;
      box-shadow: 0 0 10px rgba(0,255,0,0.3);
    }

    /* INFO SYSTEM (Sinistra e Destra) */
    .system-info-left {
      position: absolute;
      top: 150px;
      left: 40px;
      font-size: 1.2rem;
      line-height: 1.5;
    }
    .system-info-left .code { font-size: 2rem; margin-bottom: 10px; font-weight: bold; }

    .system-info-right {
      position: absolute;
      top: 170px;
      right: 40px;
      border: 2px solid var(--blue);
      padding: 10px 20px;
      font-family: var(--font-kanji);
      font-size: 3rem;
      color: var(--blue);
      text-align: center;
      box-shadow: inset 0 0 15px rgba(66, 188, 245, 0.2);
    }

    /* AREA PANNELLI CENTRALI */
    .panels-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      margin-top: -50px;
    }

    /* Tagli geometrici dei pannelli */
    .panel {
      background-color: var(--blue);
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-family: sans-serif;
      text-transform: uppercase;
      transition: background-color 0.3s, transform 0.1s;
      position: absolute;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }

    .panel-name { font-size: clamp(1.5rem, 3vw, 3rem); letter-spacing: 0.1em; }
    .panel-vote { font-size: clamp(2rem, 4vw, 4rem); margin-top: 10px; display: none; }

    /* BALTHASAR (Top Center) */
    #panel-balthasar {
      width: 40%;
      height: 250px;
      top: 0;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 75% 100%, 25% 100%, 0 70%);
    }

    /* CASPER (Bottom Left) */
    #panel-casper {
      width: 38%;
      height: 250px;
      bottom: 0;
      left: 5%;
      clip-path: polygon(0 0, 75% 0, 100% 30%, 100% 70%, 75% 100%, 0 100%);
    }

    /* MELCHIOR (Bottom Right) */
    #panel-melchior {
      width: 38%;
      height: 250px;
      bottom: 0;
      right: 5%;
      clip-path: polygon(25% 0, 100% 0, 100% 100%, 25% 100%, 0 70%, 0 30%);
    }

    /* Hexagon Center */
    .magi-center {
      position: absolute;
      font-family: var(--font-kanji);
      font-size: 3rem;
      color: var(--orange);
      font-weight: 900;
      letter-spacing: 0.2em;
      top: 55%;
      text-shadow: 0 0 15px rgba(255,153,0,0.8);
    }

    /* FOOTER / TERMINAL INPUT */
    .terminal-footer {
      border-top: 2px solid var(--orange);
      padding: 10px 20px;
      font-size: 1.2rem;
      background: #000;
      z-index: 20;
    }

    .terminal-line {
      display: flex;
      margin-bottom: 5px;
      align-items: flex-start;
    }

    .terminal-label {
      width: 150px;
      color: var(--orange);
      flex-shrink: 0;
    }

    .terminal-value {
      color: var(--orange);
      border-bottom: 1px dotted var(--orange-dim);
      flex: 1;
      min-height: 1.5rem;
    }

    textarea#dilemma-input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--orange-dim);
      color: var(--blue);
      font-family: var(--font-tech);
      font-size: 1.2rem;
      resize: none;
      outline: none;
      padding: 5px;
      height: 60px;
    }
    
    textarea#dilemma-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 10px rgba(255,153,0,0.2);
    }

    /* Animations & States */
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .analyzing { animation: blink 1s infinite; background-color: var(--orange) !important; }
    
    .vote-si { background-color: #00ff66 !important; }
    .vote-no { background-color: #ff3333 !important; }
    
    .verdict-approved { color: #00ff66 !important; text-shadow: 0 0 20px rgba(0,255,102,0.8); }
    .verdict-rejected { color: #ff3333 !important; text-shadow: 0 0 20px rgba(255,51,51,0.8); }
    
    button#submit-btn {
      display: none; /* Nascondiamo il bottone, inviamo con Invio */
    }

    .instruction {
      font-size: 0.8rem;
      color: var(--orange-dim);
      text-align: right;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="scanlines"></div>

  <div class="magi-wrapper">
    <div class="magi-inner">
      
      <!-- HEADER -->
      <div class="header">
        <div style="width: 35%;">
          <div class="kanji-title">質 問</div>
          <div class="green-lines"></div>
        </div>
        <div style="width: 35%; text-align: right;">
          <div class="kanji-title">解 決</div>
          <div class="green-lines"></div>
        </div>
      </div>

      <!-- SYSTEM INFO -->
      <div class="system-info-left">
        <div class="code">CODE:473</div>
        FILE:MAGI_SYS<br>
        EXTENTION:3023<br>
        EX_MODE:OFF<br>
        PRIORITY:AAA
      </div>

      <!-- RISULTATO FINALE -->
      <div class="system-info-right" id="final-result-box">
        情 報
      </div>

      <!-- PANELS AREA -->
      <div class="panels-area">
        
        <div class="panel" id="panel-balthasar">
          <div class="panel-name">BALTHASAR・2</div>
          <div class="panel-vote" id="vote-balthasar"></div>
        </div>

        <div class="panel" id="panel-casper">
          <div class="panel-name">CASPER・3</div>
          <div class="panel-vote" id="vote-casper"></div>
        </div>

        <div class="panel" id="panel-melchior">
          <div class="panel-name">MELCHIOR・1</div>
          <div class="panel-vote" id="vote-melchior"></div>
        </div>

        <div class="magi-center">MAGI</div>

      </div>

      <!-- TERMINAL INPUT -->
      <div class="terminal-footer">
        <div class="terminal-line">
          <div class="terminal-label">access code:</div>
          <div class="terminal-value">******************************</div>
        </div>
        <div class="terminal-line">
          <div class="terminal-label">question:</div>
          <div class="terminal-value" style="border: none;">
            <textarea id="dilemma-input" placeholder="Inserisci il dilemma qui e premi SHIFT + INVIO per deliberare..."></textarea>
          </div>
        </div>
        <div class="instruction">PRESS [SHIFT + ENTER] TO EXECUTE</div>
      </div>

    </div>
  </div>

  <script>
    // Gestione dell'invio tramite SHIFT + ENTER
    document.getElementById('dilemma-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.shiftKey) {
        e.preventDefault(); // Evita di andare a capo
        startDeliberation();
      }
    });

    async function startDeliberation() {
      const dilemmaText = document.getElementById('dilemma-input').value.trim();
      if (!dilemmaText) return;

      // Reset interfaccia per l'analisi
      const panels = ['melchior', 'balthasar', 'casper'];
      panels.forEach(p => {
        const panelEl = document.getElementById('panel-' + p);
        const voteEl = document.getElementById('vote-' + p);
        
        panelEl.className = 'panel analyzing'; // Diventa arancione lampeggiante
        voteEl.style.display = 'block';
        voteEl.textContent = 'ANALYZING...';
        voteEl.style.color = '#000';
      });

      const resultBox = document.getElementById('final-result-box');
      resultBox.textContent = '計 算 中'; // "Calcolando" in Kanji
      resultBox.className = 'system-info-right';

      try {
        // Chiamata al backend Python FastAPI
        const response = await fetch('/api/delibera', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dilemma: dilemmaText })
        });

        if (!response.ok) throw new Error("Errore dal server");
        const data = await response.json();

        // Funzione per applicare il voto alla UI
        function applyVote(name, vote) {
          const panelEl = document.getElementById('panel-' + name);
          const voteEl = document.getElementById('vote-' + name);
          
          panelEl.className = 'panel'; // Rimuove analyzing
          
          if (vote === 'SI') {
            panelEl.classList.add('vote-si');
            voteEl.textContent = '[ SI ]';
          } else if (vote === 'NO') {
            panelEl.classList.add('vote-no');
            voteEl.textContent = '[ NO ]';
          } else {
            voteEl.textContent = '[ ERR ]';
          }
        }

        // Applica i risultati
        applyVote('melchior', data.melchior_voto);
        applyVote('balthasar', data.balthasar_voto);
        applyVote('casper', data.casper_voto);

        // Aggiorna il box "Informazioni" in alto a destra
        setTimeout(() => {
          if (data.decisione_finale.includes("APPROVATO")) {
            resultBox.textContent = '承 認'; // Approvato
            resultBox.classList.add('verdict-approved');
          } else {
            resultBox.textContent = '拒 否'; // Respinto
            resultBox.classList.add('verdict-rejected');
          }
        }, 500);

      } catch (error) {
        console.error("Errore di connessione a MAGI:", error);
        resultBox.textContent = 'ERRORE';
        resultBox.style.color = '#ff3333';
        panels.forEach(p => document.getElementById('panel-' + p).className = 'panel');
      }
    }
  </script>

</body>
</html>
