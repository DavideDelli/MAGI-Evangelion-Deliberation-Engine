<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGI Supercomputer System - NERV HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+JP:wght@900&display=swap');

    :root {
      --orange: #ff9900;
      --orange-dim: #cc7a00;
      --orange-dark: #221100;
      --green: #00ff00;
      --blue-magi: #32bef6; 
      --bg: #000000;
      --font-tech: 'Share Tech Mono', monospace;
      --font-kanji: 'Noto Serif JP', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--orange);
      font-family: var(--font-tech);
      height: 100vh; width: 100vw;
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }

    /* Effetto Scanline CRT più sottile */
    .scanlines {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
      background-size: 100% 4px;
      z-index: 1000; pointer-events: none;
      opacity: 0.4;
    }

    /* --- SCHERMATA INPUT --- */
    #screen-input {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--bg); z-index: 500; transition: opacity 0.5s ease;
    }
    .input-frame {
      width: 600px; border: 3px solid var(--orange); padding: 40px;
      background: rgba(255, 153, 0, 0.02); text-align: center;
    }
    textarea#dilemma-init {
      width: 100%; height: 180px; background: #050505; border: 1px solid var(--orange-dim);
      color: var(--blue-magi); font-family: var(--font-tech); font-size: 1.2rem;
      padding: 15px; outline: none; resize: none; margin: 20px 0;
    }
    .btn-exec {
      width: 100%; padding: 15px; background: transparent; border: 2px solid var(--orange);
      color: var(--orange); cursor: pointer; font-size: 1.1rem; letter-spacing: 0.2em;
    }
    .btn-exec:hover { background: var(--orange); color: #000; }

    /* --- INTERFACCIA MAGI --- */
    #screen-magi {
      position: absolute; inset: 0; display: none; padding: 1.5vh; opacity: 0;
    }
    .main-wrapper {
      width: 100%; height: 100%; border: 0.4vw solid var(--orange);
      padding: 0.3vw; position: relative;
    }
    .inner-system {
      width: 100%; height: 100%; border: 0.15vw solid var(--orange);
      position: relative; overflow: hidden;
    }

    /* Header e Kanji */
    .header-kanji {
      position: absolute; top: 1vh; left: 0; right: 0;
      display: flex; justify-content: space-between; padding: 0 4vw;
      font-family: var(--font-kanji); font-size: 5.5vw; z-index: 10;
    }
    .status-bar {
      position: absolute; top: 13.5vh; left: 1vw; right: 1vw;
      height: 0.8vh; border-top: 0.2vw solid var(--green); border-bottom: 0.1vw solid var(--green);
      opacity: 0.6;
    }

    /* Blocchi Dati */
    .data-left { position: absolute; top: 17vh; left: 3vw; font-size: 1.1vw; line-height: 1.2; z-index: 10; }
    .code-id { font-size: 2.8vw; font-weight: bold; margin-bottom: 5px; }

    .data-right {
      position: absolute; top: 20vh; right: 3vw; border: 0.2vw solid var(--blue-magi);
      padding: 10px 35px; font-family: var(--font-kanji); font-size: 3.5vw; color: var(--blue-magi);
      z-index: 10; transition: 0.3s;
    }
    .data-right.approved { color: var(--green); border-color: var(--green); text-shadow: 0 0 15px var(--green); }
    .data-right.rejected { color: #ff3333; border-color: #ff3333; text-shadow: 0 0 15px #ff3333; }

    /* --- ARCHITETTURA CENTRALE (IL CORE) --- */
    /* Hub Centrale (Più piccolo per svuotare il centro) */
    .central-hub {
      position: absolute; top: 56%; left: 50%; transform: translate(-50%, -50%);
      width: 15vw; height: 7vh; background: #000; border: 0.3vw solid var(--orange);
      z-index: 30; display: flex; justify-content: center; align-items: center;
      font-family: var(--font-kanji); font-size: 3.5vw; letter-spacing: 0.3em;
      box-shadow: 0 0 40px rgba(0,0,0,1);
    }

    /* Ponti di Connessione */
    .connector { position: absolute; background: var(--orange); z-index: 5; }
    /* Ponte superiore più lungo per allontanare Balthasar */
    .conn-top { top: 40vh; left: 50%; transform: translateX(-50%); width: 2.2vw; height: 12vh; }
    /* Ponti diagonali più lunghi per allontanare Casper/Melchior */
    .conn-left { top: 58vh; left: 33vw; width: 10vw; height: 2.2vw; transform: rotate(30deg); }
    .conn-right { top: 58vh; right: 33vw; width: 10vw; height: 2.2vw; transform: rotate(-30deg); }

    /* PANNELLI MAGI (Dimensioni ridotte rispetto a prima) */
    .panel {
      position: absolute; background: var(--blue-magi); color: #000;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-weight: 900; pointer-events: auto; z-index: 20;
      box-shadow: inset 0 0 5vw rgba(0,0,0,0.3); transition: 0.2s;
    }
    .p-label { font-size: 2.4vw; letter-spacing: 0.05em; }
    .p-vote { font-size: 3.2vw; margin-top: 10px; display: none; }

    #balthasar {
      top: 6vh; left: 50%; transform: translateX(-50%);
      width: 30vw; height: 34vh;
      clip-path: polygon(0 0, 100% 0, 100% 80%, 75% 100%, 25% 100%, 0 80%);
    }
    #casper {
      bottom: 12vh; left: 2vw;
      width: 38vw; height: 32vh;
      clip-path: polygon(0 0, 75% 0, 100% 25%, 100% 100%, 0 100%);
    }
    #melchior {
      bottom: 12vh; right: 2vw;
      width: 38vw; height: 32vh;
      clip-path: polygon(25% 0, 100% 0, 100% 100%, 0 100%, 0 25%);
    }

    /* Stati Visuali */
    @keyframes analyzing-pulse { 0%, 100% { background: var(--orange); } 50% { background: var(--orange-dim); } }
    .analyzing { animation: analyzing-pulse 0.4s infinite !important; }
    .vote-si { background: var(--green) !important; }
    .vote-no { background: #ff3333 !important; }
    .clickable { cursor: pointer; }
    .clickable:hover { filter: brightness(1.2); transform: scale(1.02); }

    /* Footer Terminale */
    .footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      border-top: 0.3vw solid var(--orange); background: #000;
      padding: 0.8vh 3vw; font-size: 1.1vw; z-index: 100;
    }
    .f-row { display: flex; margin-bottom: 2px; }
    .f-lab { width: 12vw; color: var(--orange); font-weight: bold; }
    .f-val { color: var(--orange); flex: 1; border-bottom: 1px dotted var(--orange-dim); overflow: hidden; white-space: nowrap; }
    .f-val span { color: var(--blue-magi); font-weight: bold; }

    /* Modale */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000;
      justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
    }
    .modal-box {
      width: 70vw; max-height: 80vh; background: #050505; border: 2px solid var(--blue-magi);
      padding: 40px; position: relative; display: flex; flex-direction: column;
    }
    .m-title { font-size: 2.5vw; color: var(--blue-magi); border-bottom: 2px solid var(--blue-magi); margin-bottom: 20px; font-family: var(--font-kanji); }
    .m-body { font-size: 1.3vw; color: #fff; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; }
    .m-close { position: absolute; top: 15px; right: 20px; color: var(--blue-magi); font-size: 2.5vw; cursor: pointer; }
  </style>
</head>
<body>

  <div class="scanlines"></div>

  <!-- INPUT -->
  <div id="screen-input">
    <div class="input-frame">
      <div class="header-kanji" style="position:static; font-size:3rem; margin-bottom:10px;">質 問</div>
      <div style="font-size:1.1rem; letter-spacing:0.2em;">MAGI DELIBERATION INPUT</div>
      <textarea id="dilemma-init" placeholder="Inserisci il dilemma morale o strategico..." autofocus></textarea>
      <button class="btn-exec" onclick="startMagi()">[ EXECUTE SYSTEM DELIBERATION ]</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-magi">
    <div class="main-wrapper">
      <div class="inner-system">
        
        <div class="header-kanji">
          <div>質 問</div>
          <div>解 決</div>
        </div>

        <div class="status-bar"></div>

        <div class="data-left">
          <div class="code-id">CODE:473</div>
          FILE:MAGI_SYS<br>EXTENSION:3023<br>EX_MODE:OFF<br>PRIORITY:AAA
        </div>

        <div class="data-right" id="final-result">情 報</div>

        <!-- Assembly Strutturale (Connettori e Hub) -->
        <div class="connector conn-top"></div>
        <div class="connector conn-left"></div>
        <div class="connector conn-right"></div>
        <div class="central-hub">MAGI</div>

        <!-- Pannelli Magi -->
        <div class="panel" id="balthasar" onclick="openInfo('BALTHASAR・2')">
          <div class="p-label">BALTHASAR・2</div>
          <div id="v-balthasar" class="p-vote"></div>
        </div>

        <div class="panel" id="casper" onclick="openInfo('CASPER・3')">
          <div class="p-label">CASPER・3</div>
          <div id="v-casper" class="p-vote"></div>
        </div>

        <div class="panel" id="melchior" onclick="openInfo('MELCHIOR・1')">
          <div class="p-label">MELCHIOR・1</div>
          <div id="v-melchior" class="p-vote"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
          <div class="f-row">
            <div class="f-lab">access code:</div>
            <div class="f-val">************************************************************</div>
          </div>
          <div class="f-row">
            <div class="f-lab">question:</div>
            <div class="f-val"><span id="q-txt">---</span></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" onclick="closeInfo()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="m-close" onclick="closeInfo()">&times;</div>
      <div class="m-title" id="m-name">IA_NAME</div>
      <div class="m-body" id="m-content"></div>
    </div>
  </div>

  <script>
    // --- AUDIO PROCEDURALE ---
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSfx(f, type, d, v=0.1) {
      if(ctx.state === 'suspended') ctx.resume();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(f, ctx.currentTime);
      g.gain.setValueAtTime(v, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + d);
    }

    const clickSfx = () => playSfx(1100, 'square', 0.06, 0.02);
    const bootSfx = () => { playSfx(350, 'sawtooth', 0.7, 0.1); setTimeout(()=>playSfx(550, 'square', 0.7, 0.1), 150); };
    const voteSfx = () => playSfx(950, 'sine', 0.4, 0.1);
    
    let drone;
    function startDrone() {
      drone = setInterval(() => {
        playSfx(160, 'triangle', 0.5, 0.03);
        setTimeout(() => playSfx(190, 'triangle', 0.5, 0.03), 250);
      }, 500);
    }
    const stopDrone = () => clearInterval(drone);

    // --- LOGICA DI SISTEMA ---
    let reportData = { balthasar: "", casper: "", melchior: "" };

    function startMagi() {
      const q = document.getElementById('dilemma-init').value.trim();
      if(!q) return;

      bootSfx();
      document.getElementById('screen-input').style.opacity = '0';
      
      setTimeout(() => {
        document.getElementById('screen-input').style.display = 'none';
        document.getElementById('screen-magi').style.display = 'block';
        setTimeout(() => document.getElementById('screen-magi').style.opacity = '1', 50);
        document.getElementById('q-txt').textContent = q;
        processDeliberation(q);
      }, 500);
    }

    async function processDeliberation(query) {
      startDrone();
      const units = ['balthasar', 'casper', 'melchior'];
      
      units.forEach(u => {
        const p = document.getElementById(u);
        const v = document.getElementById('v-' + u);
        p.className = 'panel analyzing';
        v.style.display = 'block';
        v.textContent = 'ANALYZING...';
      });

      const res = document.getElementById('final-result');
      res.textContent = '計 算 中'; 

      try {
        // Mock dati (Integrazione backend)
        const mockResponse = {
          balthasar_v: 'SI', balthasar_t: "ANALISI LOGICA SCIENTIFICA:\nI dati indicano una probabilità di successo elevata. La soluzione proposta è l'unica razionale per il mantenimento dell'ordine sistemico.",
          casper_v: 'SI', casper_t: "ANALISI ISTINTIVA:\nL'istinto di protezione rileva la necessità dell'azione. Sebbene il rischio sia presente, l'impulso è di procedere.",
          melchior_v: 'SI', melchior_t: "ANALISI EMPATICA UMANA:\nIl costo emotivo è alto, ma necessario per il futuro collettivo. Melchior approva basandosi sulla preservazione dell'umanità.",
          finale: "APPROVATO"
        };

        await new Promise(r => setTimeout(r, 2800));
        stopDrone();

        reportData = { balthasar: mockResponse.balthasar_t, casper: mockResponse.casper_t, melchior: mockResponse.melchior_t };

        showVote('balthasar', mockResponse.balthasar_v, 0);
        showVote('casper', mockResponse.casper_v, 1100);
        showVote('melchior', mockResponse.melchior_v, 2200);

        setTimeout(() => {
          if(mockResponse.finale === "APPROVATO") {
            res.textContent = '承 認';
            res.className = 'data-right approved';
            playSfx(1000, 'square', 1.5, 0.1);
          } else {
            res.textContent = '拒 否';
            res.className = 'data-right rejected';
            playSfx(250, 'sawtooth', 1.5, 0.1);
          }
        }, 3200);

      } catch (e) {
        stopDrone();
        res.textContent = 'ERROR';
      }
    }

    function showVote(id, vote, delay) {
      setTimeout(() => {
        const p = document.getElementById(id);
        const v = document.getElementById('v-' + id);
        voteSfx();
        p.classList.remove('analyzing');
        p.classList.add('clickable');
        if(vote === 'SI') { p.classList.add('vote-si'); v.textContent = '[ SI ]'; }
        else { p.classList.add('vote-no'); v.textContent = '[ NO ]'; }
      }, delay);
    }

    function openInfo(name) {
      const key = name.split('・')[0].toLowerCase();
      const txt = reportData[key];
      if(!txt) return;
      clickSfx();
      document.getElementById('m-name').textContent = name;
      document.getElementById('m-content').textContent = txt;
      const m = document.getElementById('modal-overlay');
      m.style.display = 'flex';
      setTimeout(() => m.style.opacity = '1', 10);
    }

    function closeInfo() {
      clickSfx();
      const m = document.getElementById('modal-overlay');
      m.style.opacity = '0';
      setTimeout(() => m.style.display = 'none', 300);
    }
  </script>
</body>
</html>
