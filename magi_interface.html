<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGI Supercomputer System - NERV HQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Serif+JP:wght@900&display=swap');

    :root {
      /* Colori corretti basati sul frame originale dell'anime */
      --orange: #ffb000;
      --orange-dim: #b37b00;
      --orange-dark: #332400;
      --green: #00ff00;
      --green-dim: #008000;
      --blue-magi: #42bcf5; 
      --bg: #000000;
      --font-tech: 'Share Tech Mono', monospace;
      --font-kanji: 'Noto Serif JP', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--orange);
      font-family: var(--font-tech);
      height: 100vh; width: 100vw;
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      user-select: none;
    }

    /* Effetto CRT Scanline */
    .scanlines {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 4px;
      z-index: 1000; pointer-events: none;
      opacity: 0.3;
    }

    /* --- SCHERMATA INPUT --- */
    #screen-input {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: var(--bg); z-index: 500; transition: opacity 0.5s ease;
    }
    .input-frame {
      width: 800px; border: 2px solid var(--orange); padding: 50px;
      background: rgba(255, 176, 0, 0.03); text-align: center;
      box-shadow: 0 0 20px rgba(255, 176, 0, 0.1) inset;
    }
    .input-header-kanji { font-family: var(--font-kanji); font-size: 4rem; color: var(--orange); margin-bottom: 10px; }
    textarea#dilemma-init {
      width: 100%; height: 250px; background: #050505; border: 1px solid var(--orange-dim);
      color: var(--blue-magi); font-family: var(--font-tech); font-size: 1.4rem;
      padding: 20px; outline: none; resize: none; margin: 25px 0;
    }
    .btn-exec {
      width: 100%; padding: 18px; background: transparent; border: 2px solid var(--orange);
      color: var(--orange); cursor: pointer; font-size: 1.2rem; letter-spacing: 0.3em; font-weight: bold;
      transition: all 0.2s;
    }
    .btn-exec:hover { background: var(--orange); color: #000; }

    /* --- INTERFACCIA MAGI --- */
    #screen-magi {
      position: absolute; inset: 0; display: none; padding: 1.5vw; opacity: 0; transition: opacity 0.6s ease;
    }
    
    /* Layout a bordi concentrici fedele all'originale */
    .border-outer {
      width: 100%; height: 100%; border: 3px solid var(--orange);
      padding: 5px; position: relative;
    }
    .border-inner-1 {
      width: 100%; height: 100%; border: 1px solid var(--orange);
      padding: 8px; position: relative;
    }
    .main-wrapper {
      width: 100%; height: 100%; border: 2px solid var(--orange);
      position: relative; overflow: hidden; background: var(--bg);
    }

    /* Top Layout - HUD Text */
    .hud-top-left {
      position: absolute; top: 3vh; left: 3vw; width: 25vw; z-index: 10;
    }
    .hud-top-right {
      position: absolute; top: 3vh; right: 3vw; width: 20vw; text-align: right; z-index: 10;
    }

    .kanji-title {
      font-family: var(--font-kanji); font-size: 6vw; letter-spacing: 0.2em;
      line-height: 1; margin-bottom: 25px; /* Aumentato il margine per distanziare le linee verdi */
    }

    /* Le doppie linee verdi locali */
    .green-lines {
      border-top: 3px solid var(--green);
      border-bottom: 2px solid var(--green);
      height: 10px; width: 100%; margin-bottom: 20px;
      opacity: 0.8;
    }

    .data-left-block { font-size: 1vw; line-height: 1.2; letter-spacing: 0.05em; }
    .code-id { font-size: 2.5vw; font-weight: 900; margin-bottom: 10px; letter-spacing: 0.1em;}

    /* Box Info in alto a destra */
    .data-right-box {
      display: inline-block;
      border: 3px solid var(--blue-magi);
      padding: 5px 20px; font-family: var(--font-kanji); font-size: 3vw; color: var(--blue-magi);
      transition: all 0.3s; margin-top: 10px;
    }
    .data-right-box.approved { color: var(--green); border-color: var(--green); text-shadow: 0 0 10px var(--green); box-shadow: 0 0 15px rgba(0,255,0,0.2) inset; }
    .data-right-box.rejected { color: #ff3333; border-color: #ff3333; text-shadow: 0 0 10px #ff3333; box-shadow: 0 0 15px rgba(255,51,51,0.2) inset; }

    /* --- CORE HARDWARE (SVG PIXEL PERFECT) --- */
    #magi-hardware-container {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 1; /* Sotto ai testi HUD top/bottom */
    }

    svg#magi-svg { width: 100%; height: 100%; }

    /* Linee arancioni di connessione di background - Rese più spesse */
    .magi-bg-line { fill: none; stroke: var(--orange); stroke-width: 25; stroke-linecap: square; }

    /* Poligoni azzurri */
    .magi-poly { 
      fill: var(--blue-magi); stroke: var(--bg); stroke-width: 4; 
      transition: fill 0.2s; cursor: pointer; 
    }
    .magi-poly:hover { filter: brightness(1.2); }

    /* Testi interni ai poligoni */
    .text-label { 
      font-family: var(--font-tech); font-weight: 900; fill: #000; 
      pointer-events: none; text-anchor: middle; font-size: 55px; 
    }
    .text-vote { 
      font-family: var(--font-tech); font-weight: 900; fill: #000; 
      pointer-events: none; text-anchor: middle; font-size: 50px; 
      opacity: 0; transition: opacity 0.3s; 
    }

    /* Animazioni Stati */
    @keyframes pulse-analyzing { 0%, 100% { fill: var(--orange); } 50% { fill: var(--orange-dim); } }
    .analyzing { animation: pulse-analyzing 0.4s infinite !important; }
    .vote-si { fill: var(--green) !important; }
    .vote-no { fill: #ff3333 !important; }

    /* Scritta centrale MAGI */
    .magi-center-text {
      position: absolute; top: 52.5%; left: 50%; transform: translate(-50%, -50%);
      font-family: var(--font-kanji); color: var(--orange); font-size: 4.5vw;
      letter-spacing: 0.15em; font-weight: 900; z-index: 5;
    }

    /* Footer Terminale */
    .footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      border-top: 2px solid var(--orange); background: #000;
      padding: 1.5vh 3vw; font-size: 1vw; z-index: 10;
    }
    /* Doppia linea del footer */
    .footer::before {
      content: ''; position: absolute; top: -6px; left: 0; right: 0;
      border-top: 1px solid var(--orange); height: 1px;
    }
    
    .f-row { display: flex; margin-bottom: 3px; align-items: flex-end; }
    .f-lab { width: 10vw; color: var(--orange); font-weight: 900; }
    .f-val { 
      color: var(--orange); flex: 1; border-bottom: 1px dashed var(--orange-dim); 
      overflow: hidden; white-space: nowrap; padding-bottom: 2px;
    }
    .f-val span { color: var(--orange); }

    /* Modale motivazioni */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000;
      justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
    }
    .modal-box {
      width: 75vw; max-height: 80vh; background: #020202; border: 3px solid var(--blue-magi);
      padding: 50px; position: relative; display: flex; flex-direction: column;
    }
    .m-title { font-size: 3vw; color: var(--blue-magi); border-bottom: 3px solid var(--blue-magi); margin-bottom: 25px; font-family: var(--font-kanji); }
    .m-body { font-size: 1.5vw; color: #fff; line-height: 1.7; overflow-y: auto; white-space: pre-wrap; padding-right: 20px; }
    .m-close { position: absolute; top: 20px; right: 30px; color: var(--blue-magi); font-size: 3vw; cursor: pointer; }
  </style>
</head>
<body>

  <div class="scanlines"></div>

  <!-- SCHERMATA INPUT -->
  <div id="screen-input">
    <div class="input-frame">
      <div class="input-header-kanji">質 問</div>
      <div style="font-size:1.3rem; letter-spacing:0.2em; margin-bottom:30px;">MAGI DELIBERATION INPUT</div>
      <textarea id="dilemma-init" placeholder="Inserisci il dilemma morale o strategico..." autofocus></textarea>
      <button class="btn-exec" onclick="startMagi()">[ EXECUTE DELIBERATION ]</button>
    </div>
  </div>

  <!-- INTERFACCIA MAGI PRINCIPALE -->
  <div id="screen-magi">
    <div class="border-outer">
      <div class="border-inner-1">
        <div class="main-wrapper">
          
          <!-- HUD TOP LEFT -->
          <div class="hud-top-left">
            <div class="kanji-title">質 問</div>
            <div class="green-lines"></div>
            <div class="data-left-block">
              <div class="code-id">CODE:473</div>
              FILE:MAGI_SYS<br>EXTENSION:3023<br>EX_MODE:OFF<br>PRIORITY:AAA
            </div>
          </div>

          <!-- HUD TOP RIGHT -->
          <div class="hud-top-right">
            <div class="kanji-title">解 決</div>
            <div class="green-lines"></div>
            <div class="data-right-box" id="final-result">情 報</div>
          </div>

          <!-- Testo MAGI Centrale -->
          <div class="magi-center-text">MAGI</div>

          <!-- HARDWARE VETTORIALE (SVG 1920x1080 per precisione 16:9) -->
          <div id="magi-hardware-container">
            <!-- preserveAspectRatio="none" forza le proporzioni a riempire lo schermo, tipico dei terminali -->
            <svg id="magi-svg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
              
              <!-- LINEE DI CONNESSIONE ARANCIONI (BACKGROUND) -->
              <!-- Partono esattamente dal centro geometrico di ogni blocco! -->
              <!-- Essendo scritte prima nel DOM, i blocchi le sormonteranno naturalmente -->
              <line class="magi-bg-line" x1="405" y1="760" x2="1515" y2="760" /> <!-- Base: Casper -> Melchior -->
              <line class="magi-bg-line" x1="405" y1="760" x2="960" y2="270" /> <!-- Sinistra: Casper -> Balthasar -->
              <line class="magi-bg-line" x1="1515" y1="760" x2="960" y2="270" /> <!-- Destra: Melchior -> Balthasar -->


              <!-- BLOCCO BALTHASAR (Centro - Alto) -->
              <polygon id="poly-balthasar" class="magi-poly" 
                       points="600,60 1320,60 1320,350 1060,480 860,480 600,350" 
                       onclick="openInfo('BALTHASAR・2', testiModelli.balthasar)"/>
              
              <text x="960" y="230" class="text-label">BALTHASAR • 2</text>
              <text id="vote-balthasar" x="960" y="310" class="text-vote">[ SI ]</text>


              <!-- BLOCCO CASPER (Sinistra - Basso) -->
              <polygon id="poly-casper" class="magi-poly" 
                       points="0,520 550,520 810,650 810,1000 0,1000" 
                       onclick="openInfo('CASPER・3', testiModelli.casper)"/>
              
              <text x="400" y="740" class="text-label">CASPER • 3</text>
              <text id="vote-casper" x="400" y="820" class="text-vote">[ SI ]</text>


              <!-- BLOCCO MELCHIOR (Destra - Basso) -->
              <polygon id="poly-melchior" class="magi-poly" 
                       points="1920,520 1370,520 1110,650 1110,1000 1920,1000" 
                       onclick="openInfo('MELCHIOR・1', testiModelli.melchior)"/>
              
              <text x="1520" y="740" class="text-label">MELCHIOR • 1</text>
              <text id="vote-melchior" x="1520" y="820" class="text-vote">[ SI ]</text>

            </svg>
          </div>

          <!-- Footer Terminale -->
          <div class="footer">
            <div class="f-row">
              <div class="f-lab">access code:</div>
              <div class="f-val">************************************************************</div>
            </div>
            <div class="f-row">
              <div class="f-lab">question:</div>
              <div class="f-val"><span id="q-txt">---</span></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- MODALE ANALISI -->
  <div id="modal-overlay" onclick="closeInfo(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="m-close" onclick="closeInfo(event)">&times;</div>
      <div class="m-title" id="m-name">IA_NAME</div>
      <div class="m-body" id="m-content"></div>
    </div>
  </div>

  <script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Suoni generici UI
    function playSfx(f, type, d, v=0.1) {
      if(ctx.state === 'suspended') ctx.resume();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(f, ctx.currentTime);
      g.gain.setValueAtTime(v, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + d);
    }

    const clickSfx = () => playSfx(1100, 'square', 0.06, 0.02);
    const bootSfx = () => { playSfx(350, 'sawtooth', 0.7, 0.1); setTimeout(()=>playSfx(550, 'square', 0.7, 0.1), 150); };
    const voteSfx = () => playSfx(950, 'sine', 0.4, 0.1);
    
    // Suoni calcolo elaborazione
    let droneInterval;

    function startDrone() {
      if(ctx.state === 'suspended') ctx.resume();
      
      // Classico effetto "elaborazione dati" anime retro (senza bass boost)
      let step = 0;
      droneInterval = setInterval(() => {
        let freq = step % 2 === 0 ? 800 : 950; // Alternanza frequenze medie
        playSfx(freq, 'triangle', 0.04, 0.015);
        step++;
      }, 120);
    }

    const stopDrone = () => {
      clearInterval(droneInterval);
    };

    let testiModelli = { balthasar: "", casper: "", melchior: "" };

    function startMagi() {
      const q = document.getElementById('dilemma-init').value.trim();
      if(!q) return;
      bootSfx();
      document.getElementById('screen-input').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('screen-input').style.display = 'none';
        document.getElementById('screen-magi').style.display = 'block';
        setTimeout(() => document.getElementById('screen-magi').style.opacity = '1', 50);
        document.getElementById('q-txt').textContent = q;
        processDeliberation(q);
      }, 500);
    }

    async function processDeliberation(query) {
      startDrone();
      const models = ['balthasar', 'casper', 'melchior'];
      
      // Setup UI per il caricamento
      models.forEach(m => {
        const poly = document.getElementById('poly-' + m);
        const vote = document.getElementById('vote-' + m);
        poly.classList.remove('vote-si', 'vote-no');
        poly.classList.add('analyzing');
        vote.textContent = 'ANALYZING';
        vote.style.opacity = '1';
      });

      const res = document.getElementById('final-result');
      res.textContent = '計 算 中'; 
      res.className = 'data-right-box'; 

      try {
        const response = await fetch('/api/delibera', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dilemma: query })
        });
        const data = await response.json();
        stopDrone();

        testiModelli = { balthasar: data.balthasar_testo, casper: data.casper_testo, melchior: data.melchior_testo };

        reveal('balthasar', data.balthasar_voto, 100);
        reveal('casper', data.casper_voto, 900);
        reveal('melchior', data.melchior_voto, 1700);

        setTimeout(() => {
          if (data.decisione_finale.includes("APPROVATO")) {
            res.textContent = '承 認';
            res.className = 'data-right-box approved';
            playSfx(1000, 'square', 1.5, 0.1);
          } else {
            res.textContent = '拒 否';
            res.className = 'data-right-box rejected';
            playSfx(250, 'sawtooth', 1.5, 0.1);
          }
        }, 2500);

      } catch (e) {
        stopDrone();
        res.textContent = 'ERROR';
      }
    }

    function reveal(id, voteVal, delay) {
      setTimeout(() => {
        const poly = document.getElementById('poly-' + id);
        const vote = document.getElementById('vote-' + id);
        voteSfx();
        poly.classList.remove('analyzing');
        if(voteVal === 'SI') { 
          poly.classList.add('vote-si'); 
          vote.textContent = '[ SI ]'; 
        } else { 
          poly.classList.add('vote-no'); 
          vote.textContent = '[ NO ]'; 
        }
      }, delay);
    }

    function openInfo(name, testo) {
      if(!testo) return;
      clickSfx();
      document.getElementById('m-name').textContent = name;
      document.getElementById('m-content').innerHTML = testo.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      const m = document.getElementById('modal-overlay');
      m.style.display = 'flex';
      setTimeout(() => m.style.opacity = '1', 10);
    }

    function closeInfo(event) {
      clickSfx();
      const m = document.getElementById('modal-overlay');
      m.style.opacity = '0';
      setTimeout(() => m.style.display = 'none', 300);
    }

    document.getElementById('dilemma-init').addEventListener('input', clickSfx);
  </script>
</body>
</html>
